<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Fireman Burger — Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800;900&family=Barlow+Condensed:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --red:       #D41C1C;
  --red-dim:   #a81515;
  --red-glow:  rgba(212,28,28,0.35);
  --gold:      #C8902A;
  --ember-ok:  #22c55e;
  --ember-warn:#f59e0b;
  --bg:        #0D0D0D;
  --surface:   #131313;
  --surface2:  #1b1b1b;
  --surface3:  #242424;
  --surface4:  #2d2d2d;
  --border:    rgba(255,255,255,0.07);
  --border-mid:rgba(255,255,255,0.12);
  --border-hi: rgba(255,255,255,0.18);
  --text:      #EDE8E2;
  --text-2:    #8A7F78;
  --text-3:    #4C4542;
  --nav-h:     62px;
  --hdr-h:     64px;
  --font-d:    'Barlow Condensed', sans-serif;
  --font-b:    'Barlow', sans-serif;
  --font-m:    'JetBrains Mono', monospace;
  --metal: repeating-linear-gradient(135deg,transparent,transparent 3px,rgba(255,255,255,.008) 3px,rgba(255,255,255,.008) 6px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-tap-highlight-color:transparent}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-b);
  font-size:15px;
  line-height:1.5;
  min-height:100dvh;
  padding-bottom:var(--nav-h);
}

/* ── HEADER ── */
.hdr{
  position:sticky;top:0;z-index:200;
  height:var(--hdr-h);
  background:var(--bg);
  background-image:repeating-linear-gradient(90deg,transparent,transparent 12px,rgba(255,255,255,.004) 12px,rgba(255,255,255,.004) 13px);
  border-bottom:2px solid var(--red);
  box-shadow:0 2px 28px var(--red-glow);
  display:flex;align-items:center;padding:0 16px;gap:12px;
}
.hdr-logo{display:flex;align-items:center;gap:11px;flex:1;min-width:0}
.hdr-logo svg{flex-shrink:0}
.logo-words{display:flex;flex-direction:column;line-height:1.1}
.logo-brand{
  font-family:var(--font-d);font-weight:800;font-size:21px;
  letter-spacing:2.5px;text-transform:uppercase;color:var(--text);white-space:nowrap;
}
.logo-mod{
  font-family:var(--font-m);font-size:9px;font-weight:500;
  letter-spacing:2px;text-transform:uppercase;color:var(--gold);
}
.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.hdr-time{
  font-family:var(--font-m);font-size:14px;font-weight:500;
  color:var(--text-3);letter-spacing:2px;
}
.hdr-link{
  font-family:var(--font-m);font-size:9.5px;font-weight:500;letter-spacing:1px;
  text-transform:uppercase;color:var(--text-2);text-decoration:none;
  padding:6px 10px;border:1px solid var(--border-mid);border-radius:3px;
  background:var(--surface2);transition:all .15s;white-space:nowrap;
}
.hdr-link:hover{color:var(--gold);border-color:rgba(200,144,42,.4)}

/* ── NAVEGAÇÃO ENTRE PÁGINAS ── */
.page-nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border-mid)}
.pn-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;
  font-family:var(--font-m);font-size:9px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--text-3);text-decoration:none;border-right:1px solid var(--border);
}
.pn-item:last-child{border-right:none}
.pn-item .pn-ico{font-size:15px;line-height:1}
.pn-item.active{color:var(--gold);background:var(--metal)}

/* ── DATA / RESPONSÁVEL ── */
.top-box{padding:14px 14px 0}
.data-lbl{
  font-family:var(--font-m);font-size:9px;font-weight:500;letter-spacing:2.5px;
  text-transform:uppercase;color:var(--text-3);text-align:center;margin-bottom:10px;
}
.data-lbl span{color:var(--gold)}
.campo label{
  display:block;font-family:var(--font-m);font-size:9px;font-weight:500;
  letter-spacing:2px;text-transform:uppercase;color:var(--text-3);margin-bottom:8px;
}
.campo input{
  width:100%;background:var(--surface2);border:1px solid var(--border-mid);
  color:var(--text);padding:12px 14px;border-radius:3px;
  font-family:var(--font-b);font-size:15px;font-weight:600;
  transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;
}
.campo input:focus{outline:none;border-color:rgba(212,28,28,.55);box-shadow:0 0 0 2px rgba(212,28,28,.09)}
.campo input::placeholder{color:var(--text-3)}

/* ── TURNO TABS ── */
.turno-tabs{display:flex;gap:6px;padding:14px 14px 0}
.turno-tab{
  flex:1;padding:13px 6px;border:1px solid var(--border-mid);background:var(--surface);
  color:var(--text-2);font-family:var(--font-d);font-size:15px;font-weight:800;
  letter-spacing:2px;text-transform:uppercase;text-align:center;cursor:pointer;
  border-radius:3px;transition:all .15s;user-select:none;position:relative;
}
.turno-tab.active{background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 2px 14px rgba(212,28,28,.35)}
.turno-tab .tcount{
  display:block;font-family:var(--font-m);font-size:9px;font-weight:500;
  letter-spacing:1px;margin-top:3px;opacity:.75;
}

/* ── PROGRESS ── */
.progress-wrap{padding:14px 14px 0}
.progress-bar{
  height:8px;background:var(--surface2);border:1px solid var(--border-mid);
  border-radius:4px;overflow:hidden;
}
.progress-fill{
  height:100%;background:var(--ember-ok);transition:width .3s ease;
  box-shadow:0 0 10px rgba(34,197,94,.5);
}
.progress-fill.partial{background:var(--ember-warn);box-shadow:0 0 10px rgba(245,158,11,.45)}
.progress-txt{
  text-align:center;font-family:var(--font-m);font-size:10px;font-weight:500;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--text-3);margin-top:8px;
}
.progress-txt.done{color:var(--ember-ok)}

/* ── CHECKLIST ITEMS ── */
.items-wrap{padding:0 14px 14px;display:flex;flex-direction:column;gap:8px}
.chk-row{
  display:flex;align-items:flex-start;gap:12px;
  background:var(--surface);background-image:var(--metal);
  border:1px solid var(--border);border-radius:3px;padding:14px;
  transition:border-color .2s;cursor:pointer;
}
.chk-row.done{border-left:3px solid var(--ember-ok);background:rgba(34,197,94,.04)}
.chk-box{
  width:26px;height:26px;flex-shrink:0;border:2px solid var(--border-hi);
  border-radius:4px;background:var(--surface2);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:800;color:transparent;
  transition:all .15s;margin-top:1px;
}
.chk-row.done .chk-box{
  background:var(--ember-ok);border-color:var(--ember-ok);
  color:#0D0D0D;box-shadow:0 0 14px rgba(34,197,94,.5);
}
.chk-info{flex:1;min-width:0}
.chk-tarefa{
  font-family:var(--font-b);font-weight:700;font-size:14.5px;color:var(--text);
  line-height:1.35;
}
.chk-row.done .chk-tarefa{color:var(--text-2);text-decoration:line-through;text-decoration-color:rgba(34,197,94,.4)}
.chk-meta{
  font-family:var(--font-m);font-size:10px;color:var(--ember-ok);margin-top:5px;
  letter-spacing:.5px;
}

/* ── EMPTY ── */
.vazio{
  text-align:center;color:var(--text-3);font-family:var(--font-m);font-size:11px;
  padding:52px 20px;line-height:2.8;letter-spacing:1px;text-transform:uppercase;
}
.loading{
  text-align:center;color:var(--text-3);font-family:var(--font-m);font-size:11px;
  padding:52px 20px;line-height:2.8;letter-spacing:1px;text-transform:uppercase;
}
.spin{
  width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--red);
  border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── BOTTOM NAV ── */
.bot-nav{
  position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);
  background:var(--surface);background-image:var(--metal);
  border-top:1px solid var(--border-mid);
  display:flex;z-index:200;
  padding-bottom:env(safe-area-inset-bottom);
}
.nav-btn{
  flex:1;background:none;border:none;border-top:2px solid transparent;
  color:var(--text-3);display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;cursor:pointer;transition:all .15s;
  padding:8px 4px;-webkit-tap-highlight-color:transparent;text-decoration:none;
}
.nav-btn.active{color:var(--red);border-top-color:var(--red)}
.nav-ico{font-size:16px;line-height:1;font-family:var(--font-d);font-weight:800}
.nav-lbl{font-family:var(--font-m);font-size:7.5px;font-weight:500;letter-spacing:1px;text-transform:uppercase}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:calc(var(--nav-h) + 12px);left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--surface);border:1px solid var(--border-hi);color:var(--text);
  font-family:var(--font-m);font-size:11px;font-weight:500;letter-spacing:.5px;
  padding:10px 22px;border-radius:3px;opacity:0;pointer-events:none;
  transition:all .25s;z-index:999;white-space:nowrap;
  box-shadow:0 4px 28px rgba(0,0,0,.55);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok {border-color:rgba(34,197,94,.5);color:var(--ember-ok)}
.toast.err{border-color:rgba(212,28,28,.5);color:var(--red)}

/* ── ADD TASK ── */
.add-task{display:flex;gap:8px;margin-top:2px}
.add-task input{
  flex:1;background:var(--surface2);border:1px solid var(--border-mid);
  color:var(--text);padding:12px 14px;border-radius:3px;
  font-family:var(--font-b);font-size:14px;font-weight:600;-webkit-appearance:none;
}
.add-task input:focus{outline:none;border-color:rgba(212,28,28,.55);box-shadow:0 0 0 2px rgba(212,28,28,.09)}
.add-task input::placeholder{color:var(--text-3)}
.add-task button{
  flex-shrink:0;width:48px;background:var(--surface3);border:1px solid var(--border-mid);
  color:var(--gold);border-radius:3px;font-family:var(--font-d);font-weight:800;
  font-size:22px;cursor:pointer;transition:all .15s;
}
.add-task button:hover{background:rgba(200,144,42,.12);border-color:rgba(200,144,42,.4)}

/* ── DELETE TASK ── */
.chk-del{
  flex-shrink:0;background:none;border:none;color:var(--text-3);
  font-size:15px;padding:4px 2px;cursor:pointer;transition:color .15s;margin-top:1px;
}
.chk-del:hover{color:var(--red)}
</style>
</head>
<body>

<!-- ══ HEADER ══ -->
<header class="hdr">
  <div class="hdr-logo">
    <svg width="40" height="45" viewBox="0 0 90 100" xmlns="http://www.w3.org/2000/svg" style="overflow:visible">
      <line x1="16" y1="88" x2="74" y2="12" stroke="white" stroke-width="9" stroke-linecap="round"/>
      <line x1="74" y1="88" x2="16" y2="12" stroke="white" stroke-width="9" stroke-linecap="round"/>
      <path d="M74,10 C84,2 95,10 91,23 L76,16 Z" fill="white"/>
      <path d="M16,10 C6,2 -5,10 -1,23 L14,16 Z" fill="white"/>
      <circle cx="14" cy="88" r="7" fill="white"/>
      <circle cx="76" cy="88" r="7" fill="white"/>
      <path d="M37,57 C35,49 38.5,43 40,36 C39,42 41.5,39 42.5,32 C43.5,39 46,42 45,36 C47,43 50.5,49 48,57Z" fill="white"/>
      <ellipse cx="44" cy="61" rx="15" ry="7" fill="white"/>
      <rect x="29" y="61" width="30" height="4" rx="1" fill="white"/>
      <rect x="29" y="65" width="30" height="5" rx="1" fill="white"/>
      <path d="M29,70 L59,70 Q59,81 44,81 Q29,81 29,70Z" fill="white"/>
    </svg>
    <div class="logo-words">
      <span class="logo-brand">Fireman Burger</span>
      <span class="logo-mod">Checklist de Turno</span>
    </div>
  </div>
  <div class="hdr-right">
    <span class="hdr-time" id="hdrTime"></span>
    <a href="Fireman_Estoque.html" class="hdr-link">Estoque ↗</a>
  </div>
</header>

<nav class="page-nav">
  <a href="index.html" class="pn-item"><span class="pn-ico">🏠</span>Início</a>
  <a href="Fireman_Estoque.html" class="pn-item"><span class="pn-ico">📦</span>Estoque</a>
  <a href="Fireman_Fichas.html" class="pn-item"><span class="pn-ico">📋</span>Fichas</a>
  <a href="Fireman_Checklist.html" class="pn-item active"><span class="pn-ico">☑️</span>Checklist</a>
</nav>

<main>
  <div class="top-box">
    <div class="data-lbl" id="dataHoje">— <span>—</span> —</div>
    <div class="campo">
      <label>Responsável pelo turno</label>
      <input type="text" id="respNome" placeholder="Digite seu nome…" autocomplete="off">
    </div>
  </div>

  <div class="turno-tabs">
    <div class="turno-tab active" id="tab-abertura" onclick="setTurno('abertura')">
      Abertura
      <span class="tcount" id="cnt-abertura">—</span>
    </div>
    <div class="turno-tab" id="tab-fechamento" onclick="setTurno('fechamento')">
      Fechamento
      <span class="tcount" id="cnt-fechamento">—</span>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill partial" id="progressFill" style="width:0%"></div></div>
    <div class="progress-txt" id="progressTxt">CARREGANDO…</div>
  </div>

  <div class="items-wrap" id="lista">
    <div class="loading"><div class="spin"></div>Carregando…</div>
  </div>
</main>

<!-- ══ BOTTOM NAV ══ -->
<nav class="bot-nav">
  <a class="nav-btn" href="Fireman_Estoque.html">
    <span class="nav-ico">▦</span>
    <span class="nav-lbl">Estoque</span>
  </a>
  <a class="nav-btn" href="Fireman_Fichas.html">
    <span class="nav-ico">◧</span>
    <span class="nav-lbl">Fichas</span>
  </a>
  <a class="nav-btn active" href="Fireman_Checklist.html">
    <span class="nav-ico">☑</span>
    <span class="nav-lbl">Checklist</span>
  </a>
</nav>

<div class="toast" id="toast"></div>

<script>
const URL_BASE = 'https://dujpusltkduhkgbbkzku.supabase.co';
const KEY = 'sb_publishable_cB0TPoQUWXmGB6t-hCsdiQ_Ir2U_GZA';

const req = (path, opts = {}) => fetch(`${URL_BASE}/rest/v1/${path}`, {
  headers: {
    'apikey': KEY, 'Authorization': `Bearer ${KEY}`,
    'Content-Type': 'application/json',
    'Prefer': opts.prefer || 'return=representation',
    ...opts.headers
  }, ...opts
});

let itens = [];
let registros = [];
let turnoAtivo = 'abertura';
const hoje = new Date();
const hojeISO = hoje.toISOString().slice(0,10);

/* ── RELÓGIO ── */
function tick() {
  const t = new Date();
  document.getElementById('hdrTime').textContent =
    t.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
}
setInterval(tick, 1000); tick();

/* ── DATA ── */
function fmtData() {
  const dias = ['DOMINGO','SEGUNDA','TERÇA','QUARTA','QUINTA','SEXTA','SÁBADO'];
  const meses = ['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];
  const d = hoje.getDate();
  document.getElementById('dataHoje').innerHTML =
    `${dias[hoje.getDay()]} <span>${d.toString().padStart(2,'0')}/${meses[hoje.getMonth()]}</span>`;
}
fmtData();

/* ── PERSISTÊNCIA DO NOME ── */
const inputResp = document.getElementById('respNome');
inputResp.value = sessionStorage.getItem('checklist_resp') || '';
inputResp.addEventListener('input', () => sessionStorage.setItem('checklist_resp', inputResp.value));

/* ── TOAST ── */
function toast(msg, tipo) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + (tipo || 'ok') + ' show';
  setTimeout(() => el.classList.remove('show'), 2600);
}

/* ── CARREGAR ── */
async function load() {
  try {
    const [rI, rR] = await Promise.all([
      req('checklist_itens?ativo=eq.true&order=turno,ordem'),
      req(`checklist_registros?data=eq.${hojeISO}`)
    ]);
    if (!rI.ok || !rR.ok) throw 0;
    itens = await rI.json();
    registros = await rR.json();
    render();
  } catch {
    document.getElementById('lista').innerHTML =
      '<div class="vazio">Erro de conexão.<br>Verifique e tente novamente.</div>';
  }
}

function setTurno(t) {
  turnoAtivo = t;
  document.getElementById('tab-abertura').classList.toggle('active', t === 'abertura');
  document.getElementById('tab-fechamento').classList.toggle('active', t === 'fechamento');
  render();
}

function getRegistro(itemId) {
  return registros.find(r => r.item_id === itemId);
}

function render() {
  ['abertura','fechamento'].forEach(t => {
    const its = itens.filter(i => i.turno === t);
    const done = its.filter(i => {
      const r = getRegistro(i.id);
      return r && r.concluido;
    }).length;
    document.getElementById('cnt-' + t).textContent = `${done}/${its.length}`;
  });

  const lista = itens.filter(i => i.turno === turnoAtivo);
  const wrap = document.getElementById('lista');

  if (!lista.length) {
    wrap.innerHTML = '<div class="vazio">Nenhuma tarefa cadastrada<br>para este turno.</div>' + `
    <div class="add-task">
      <input type="text" id="novaTarefaInput" placeholder="Nova tarefa…" onkeydown="if(event.key==='Enter')addTarefa()">
      <button onclick="addTarefa()">＋</button>
    </div>`;
  } else {
    wrap.innerHTML = lista.map(it => {
      const r = getRegistro(it.id);
      const done = r && r.concluido;
      let meta = '';
      if (done && r.responsavel) {
        const hora = r.concluido_em
          ? new Date(r.concluido_em).toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})
          : '';
        meta = `<div class="chk-meta">✓ ${r.responsavel}${hora ? ' · ' + hora : ''}</div>`;
      }
      return `
      <div class="chk-row ${done ? 'done' : ''}" onclick="toggle('${it.id}', ${done})">
        <div class="chk-box">✓</div>
        <div class="chk-info">
          <div class="chk-tarefa">${it.tarefa}</div>
          ${meta}
        </div>
        <button class="chk-del" onclick="event.stopPropagation(); delTarefa('${it.id}')" title="Remover">✕</button>
      </div>`;
    }).join('');
    wrap.innerHTML += `
    <div class="add-task">
      <input type="text" id="novaTarefaInput" placeholder="Nova tarefa…" onkeydown="if(event.key==='Enter')addTarefa()">
      <button onclick="addTarefa()">＋</button>
    </div>`;
  }

  // progresso do turno ativo
  const its = itens.filter(i => i.turno === turnoAtivo);
  const done = its.filter(i => {
    const r = getRegistro(i.id);
    return r && r.concluido;
  }).length;
  const pct = its.length ? Math.round(done / its.length * 100) : 0;
  const fill = document.getElementById('progressFill');
  const txt = document.getElementById('progressTxt');
  fill.style.width = pct + '%';
  if (pct === 100 && its.length) {
    fill.classList.remove('partial');
    txt.classList.add('done');
    txt.textContent = `✓ TURNO CONCLUÍDO — ${done}/${its.length}`;
  } else {
    fill.classList.add('partial');
    txt.classList.remove('done');
    txt.textContent = `${done}/${its.length} TAREFAS CONCLUÍDAS`;
  }
}

async function toggle(itemId, isDone) {
  const nome = inputResp.value.trim();
  if (!isDone && !nome) {
    toast('Digite seu nome antes de marcar!', 'err');
    inputResp.focus();
    return;
  }
  const existente = getRegistro(itemId);
  try {
    if (existente) {
      const r = await req(`checklist_registros?id=eq.${existente.id}`, {
        method: 'PATCH',
        body: JSON.stringify(isDone
          ? { concluido: false }
          : { concluido: true, responsavel: nome, concluido_em: new Date().toISOString() })
      });
      if (!r.ok) throw 0;
      const [updated] = await r.json();
      const idx = registros.findIndex(x => x.id === existente.id);
      registros[idx] = updated;
    } else {
      const r = await req('checklist_registros', {
        method: 'POST',
        body: JSON.stringify({
          item_id: itemId, data: hojeISO,
          concluido: true, responsavel: nome, concluido_em: new Date().toISOString()
        })
      });
      if (!r.ok) throw 0;
      const [novo] = await r.json();
      registros.push(novo);
    }
    render();
  } catch { toast('Erro ao salvar.', 'err'); }
}

async function addTarefa() {
  const input = document.getElementById('novaTarefaInput');
  const tarefa = input.value.trim();
  if (!tarefa) return toast('Digite a tarefa!', 'err');
  const its = itens.filter(i => i.turno === turnoAtivo);
  const maxOrdem = its.reduce((m, i) => Math.max(m, i.ordem || 0), 0);
  try {
    const r = await req('checklist_itens', {
      method: 'POST',
      body: JSON.stringify({ turno: turnoAtivo, tarefa, ordem: maxOrdem + 1, ativo: true })
    });
    if (!r.ok) throw 0;
    const [novo] = await r.json();
    itens.push(novo);
    render();
    document.getElementById('novaTarefaInput').focus();
    toast('✓ Tarefa adicionada!');
  } catch { toast('Erro ao adicionar.', 'err'); }
}

async function delTarefa(id) {
  if (!confirm('Remover esta tarefa da lista?')) return;
  try {
    await req(`checklist_registros?item_id=eq.${id}`, { method: 'DELETE', headers: {} });
    const r = await req(`checklist_itens?id=eq.${id}`, { method: 'DELETE', headers: {} });
    if (!r.ok) throw 0;
    itens = itens.filter(i => i.id !== id);
    registros = registros.filter(reg => reg.item_id !== id);
    render();
    toast('Tarefa removida.');
  } catch { toast('Erro ao remover.', 'err'); }
}

load();

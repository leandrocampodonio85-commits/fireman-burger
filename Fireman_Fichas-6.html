<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Fireman Burger — Fichas Técnicas</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800;900&family=Barlow+Condensed:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --red:       #D41C1C;
  --red-dim:   #a81515;
  --red-glow:  rgba(212,28,28,0.35);
  --gold:      #C8902A;
  --ember-ok:  #22c55e;
  --ember-warn:#f59e0b;
  --bg:        #0D0D0D;
  --surface:   #131313;
  --surface2:  #1b1b1b;
  --surface3:  #242424;
  --surface4:  #2d2d2d;
  --border:    rgba(255,255,255,0.07);
  --border-mid:rgba(255,255,255,0.12);
  --border-hi: rgba(255,255,255,0.18);
  --text:      #EDE8E2;
  --text-2:    #8A7F78;
  --text-3:    #4C4542;
  --nav-h:     62px;
  --hdr-h:     64px;
  --font-d:    'Barlow Condensed', sans-serif;
  --font-b:    'Barlow', sans-serif;
  --font-m:    'JetBrains Mono', monospace;
  --metal: repeating-linear-gradient(135deg,transparent,transparent 3px,rgba(255,255,255,.008) 3px,rgba(255,255,255,.008) 6px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-tap-highlight-color:transparent}
body{
  background:var(--bg);color:var(--text);font-family:var(--font-b);
  font-size:15px;line-height:1.5;min-height:100dvh;padding-bottom:var(--nav-h);
}

/* ── HEADER ── */
.hdr{
  position:sticky;top:0;z-index:200;height:var(--hdr-h);
  background:var(--bg);
  background-image:repeating-linear-gradient(90deg,transparent,transparent 12px,rgba(255,255,255,.004) 12px,rgba(255,255,255,.004) 13px);
  border-bottom:2px solid var(--red);box-shadow:0 2px 28px var(--red-glow);
  display:flex;align-items:center;padding:0 16px;gap:12px;
}
.hdr-logo{display:flex;align-items:center;gap:11px;flex:1;min-width:0}
.hdr-logo svg{flex-shrink:0}
.logo-words{display:flex;flex-direction:column;line-height:1.1}
.logo-brand{font-family:var(--font-d);font-weight:800;font-size:21px;letter-spacing:2.5px;text-transform:uppercase;color:var(--text);white-space:nowrap}
.logo-mod{font-family:var(--font-m);font-size:9px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--gold)}
.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.hdr-time{font-family:var(--font-m);font-size:14px;font-weight:500;color:var(--text-3);letter-spacing:2px}
.hdr-link{
  font-family:var(--font-m);font-size:9.5px;font-weight:500;letter-spacing:1px;
  text-transform:uppercase;color:var(--text-2);text-decoration:none;
  padding:6px 10px;border:1px solid var(--border-mid);border-radius:3px;
  background:var(--surface2);transition:all .15s;white-space:nowrap;
}
.hdr-link:hover{color:var(--gold);border-color:rgba(200,144,42,.4)}

/* ── STATS BOARD ── */
.stats-board{
  display:grid;grid-template-columns:1fr 1fr 1fr;
  background:var(--surface);border-bottom:1px solid var(--border-mid);
}
.stat-cell{
  padding:18px 10px;text-align:center;
  border-right:1px solid var(--border);background:var(--metal);
}
.stat-cell:last-child{border-right:none}
.stat-num{
  font-family:var(--font-d);font-weight:800;font-size:52px;
  line-height:1;letter-spacing:-2px;color:var(--text);margin-bottom:5px;
}
.stat-num.gold{color:var(--gold);text-shadow:0 0 22px rgba(200,144,42,.45)}
.stat-num.grn {color:var(--ember-ok);text-shadow:0 0 22px rgba(34,197,94,.4)}
.stat-lbl{font-family:var(--font-m);font-size:8.5px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--text-3)}

/* ── SEARCH + FILTER ── */
.search-wrap{margin:14px 14px 0}
.search-input{
  width:100%;background:var(--surface);border:1px solid var(--border-mid);
  color:var(--text);padding:12px 16px;border-radius:3px;
  font-family:var(--font-d);font-size:15px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  transition:border-color .2s,box-shadow .2s;
}
.search-input::placeholder{color:var(--text-3)}
.search-input:focus{outline:none;border-color:rgba(212,28,28,.5);box-shadow:0 0 0 2px rgba(212,28,28,.1)}

.filter-row{display:flex;gap:6px;padding:10px 14px 0;overflow-x:auto;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.f-pill{
  padding:6px 14px;border:1px solid var(--border-mid);background:var(--surface);
  color:var(--text-3);font-family:var(--font-m);font-size:9.5px;font-weight:500;
  letter-spacing:1.2px;text-transform:uppercase;cursor:pointer;white-space:nowrap;
  border-radius:3px;flex-shrink:0;transition:all .15s;user-select:none;
}
.f-pill.active{background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 2px 14px rgba(212,28,28,.35)}
.f-pill:not(.active):hover{border-color:var(--border-hi);color:var(--text-2)}
.f-pill.cat.active{background:var(--gold);border-color:var(--gold);color:#0D0D0D;box-shadow:0 2px 14px rgba(200,144,42,.35)}

.badge.cat{border-color:rgba(200,144,42,.35);color:var(--gold);background:rgba(200,144,42,.08)}

/* ── LOCK SCREEN ── */
.lock-screen{
  position:fixed;inset:0;z-index:1000;background:var(--bg);
  background-image:var(--metal);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;text-align:center;gap:16px;
}
.lock-icon{font-size:44px;filter:drop-shadow(0 0 18px rgba(212,28,28,.5))}
.lock-title{font-family:var(--font-d);font-weight:800;font-size:24px;letter-spacing:2px;text-transform:uppercase;color:var(--text)}
.lock-sub{font-family:var(--font-m);font-size:9.5px;letter-spacing:2px;text-transform:uppercase;color:var(--text-3);margin-bottom:6px}
.lock-input{
  width:180px;text-align:center;font-size:30px;letter-spacing:16px;
  font-family:var(--font-m);background:var(--surface2);border:1px solid var(--border-mid);
  color:var(--text);padding:14px 0 14px 16px;border-radius:3px;-webkit-appearance:none;
}
.lock-input:focus{outline:none;border-color:rgba(212,28,28,.55);box-shadow:0 0 0 2px rgba(212,28,28,.09)}
.lock-err{color:var(--red);font-family:var(--font-m);font-size:11px;letter-spacing:1px;text-transform:uppercase;min-height:16px}
.lock-btn{max-width:200px}
.hdr-lock{
  background:var(--surface2);border:1px solid var(--border-mid);color:var(--text-2);
  width:34px;height:34px;border-radius:3px;cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;
}
.hdr-lock:hover{color:var(--red);border-color:rgba(212,28,28,.4)}

/* ── SECTION LABEL ── */
.sec-lbl{font-family:var(--font-m);font-size:8.5px;font-weight:500;letter-spacing:2.5px;text-transform:uppercase;color:var(--text-3);padding:14px 14px 8px}

/* ── RECEITA CARD ── */
.cards-wrap{padding:0 14px 14px;display:flex;flex-direction:column;gap:10px}

.rec-card{
  background:var(--surface);background-image:var(--metal);
  border:1px solid var(--border);border-radius:3px;overflow:hidden;
  transition:border-color .2s;
}
.rec-card:hover{border-color:var(--border-mid)}
.rec-card.open{border-color:var(--border-hi)}

.rec-header{
  padding:14px 16px 13px;display:flex;justify-content:space-between;
  align-items:flex-start;gap:12px;cursor:pointer;user-select:none;
}
.rec-left{flex:1;min-width:0}
.rec-nome{
  font-family:var(--font-d);font-weight:800;font-size:20px;
  text-transform:uppercase;letter-spacing:.5px;color:var(--text);line-height:1.15;margin-bottom:7px;
}
.rec-badges{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.badge{
  font-family:var(--font-m);font-size:8.5px;letter-spacing:.5px;text-transform:uppercase;
  padding:3px 9px;border-radius:3px;border:1px solid var(--border-hi);color:var(--text-3);background:var(--surface2);
}
.badge.ativo  {background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3);color:var(--ember-ok)}
.badge.inativo{background:rgba(80,72,70,.1);border-color:rgba(80,72,70,.3);color:var(--text-3)}

.rec-right{text-align:right;flex-shrink:0}
.rec-preco{
  font-family:var(--font-d);font-weight:800;font-size:28px;
  line-height:1;color:var(--gold);
}
.rec-preco-lbl{font-family:var(--font-m);font-size:8.5px;text-transform:uppercase;letter-spacing:1px;color:var(--text-3);margin-top:2px}
.rec-chevron{font-size:11px;color:var(--text-3);margin-top:8px;display:block;transition:transform .2s;text-align:right}
.rec-card.open .rec-chevron{transform:rotate(180deg)}

/* ── RECEITA BODY ── */
.rec-body{
  display:none;border-top:1px solid var(--border-mid);padding:16px;
}
.rec-card.open .rec-body{display:block}

/* CMV Panel */
.cmv-panel{
  background:var(--surface2);background-image:var(--metal);
  border:1px solid var(--border-mid);border-radius:3px;
  display:grid;grid-template-columns:1fr 1fr 1fr;
  margin-bottom:18px;overflow:hidden;
}
.cmv-cell{
  padding:14px 10px;text-align:center;border-right:1px solid var(--border);
}
.cmv-cell:last-child{border-right:none}
.cmv-val{
  font-family:var(--font-d);font-weight:800;font-size:24px;
  line-height:1;margin-bottom:4px;
}
.cmv-ok  {color:var(--ember-ok)}
.cmv-warn{color:var(--ember-warn)}
.cmv-bad {color:var(--red)}
.cmv-neu {color:var(--text-2)}
.cmv-lbl{font-family:var(--font-m);font-size:8px;text-transform:uppercase;letter-spacing:1px;color:var(--text-3)}

/* Margem bar */
.margem-bar-wrap{
  margin:0 0 18px;
}
.margem-bar-track{
  height:6px;background:var(--surface3);border-radius:2px;overflow:hidden;margin-top:6px;
}
.margem-bar-fill{
  height:100%;border-radius:2px;transition:width .4s ease;
}
.margem-bar-lbl{
  display:flex;justify-content:space-between;
  font-family:var(--font-m);font-size:8.5px;color:var(--text-3);
}

/* Ingredientes */
.sub-lbl{
  font-family:var(--font-m);font-size:8.5px;font-weight:500;
  letter-spacing:2px;text-transform:uppercase;color:var(--text-3);margin-bottom:10px;
}
.ing-table{width:100%;border-collapse:collapse;margin-bottom:18px}
.ing-table th{
  font-family:var(--font-m);font-size:8px;text-transform:uppercase;
  letter-spacing:1px;color:var(--text-3);padding:0 0 8px;text-align:left;
  border-bottom:1px solid var(--border-mid);
}
.ing-table th:last-child{text-align:right}
.ing-table td{
  padding:9px 0;font-size:14px;font-weight:600;
  border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;
}
.ing-table tr:last-child td{border-bottom:none}
.ing-table td:nth-child(2){
  font-family:var(--font-m);font-size:11px;color:var(--text-3);
}
.ing-table td:last-child{
  text-align:right;font-family:var(--font-m);font-size:11px;color:var(--text-2);
}
.btn-edit-ing{
  background:none;border:none;color:var(--text-3);cursor:pointer;
  font-size:13px;padding:2px 6px;border-radius:3px;transition:all .15s;
}
.btn-edit-ing:hover{background:var(--surface3);color:var(--text)}

/* Preparo */
.preparo-box{
  background:var(--surface2);border:1px solid var(--border);border-radius:3px;
  padding:14px;font-size:14px;font-weight:500;line-height:1.8;
  color:var(--text-2);white-space:pre-line;margin-bottom:18px;
}
.preparo-vazio{color:var(--text-3);font-style:italic;font-size:13px}

/* Card actions */
.rec-actions{display:flex;gap:8px}
.btn-action{
  flex:1;padding:10px 8px;border-radius:3px;font-family:var(--font-d);
  font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  cursor:pointer;transition:all .15s;border:1px solid var(--border-hi);
  background:var(--surface2);color:var(--text-2);
}
.btn-action:hover{background:var(--surface3);color:var(--text)}
.btn-action.danger{border-color:rgba(212,28,28,.3);color:var(--red)}
.btn-action.danger:hover{background:rgba(212,28,28,.1)}

/* ── EMPTY / LOADING ── */
.loading,.vazio{
  text-align:center;color:var(--text-3);font-family:var(--font-m);font-size:11px;
  padding:52px 20px;line-height:2.8;letter-spacing:1px;text-transform:uppercase;
}
.spin{
  width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--red);
  border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── SCREENS ── */
.screen{display:none}
.screen.active{display:block}

/* ── FORM ── */
.form-wrap{padding:14px}
.form-box{
  background:var(--surface);background-image:var(--metal);
  border:1px solid var(--border-mid);border-radius:3px;padding:22px 20px;
}
.form-title{
  font-family:var(--font-d);font-weight:800;font-size:26px;
  letter-spacing:1px;text-transform:uppercase;color:var(--text);margin-bottom:22px;line-height:1;
}
.form-title em{color:var(--gold);font-style:normal}
.campo{margin-bottom:16px}
.campo label{
  display:block;font-family:var(--font-m);font-size:9px;font-weight:500;
  letter-spacing:2px;text-transform:uppercase;color:var(--text-3);margin-bottom:8px;
}
.campo input,.campo select,.campo textarea{
  width:100%;background:var(--surface2);border:1px solid var(--border-mid);
  color:var(--text);padding:12px 14px;border-radius:3px;
  font-family:var(--font-b);font-size:15px;font-weight:600;
  transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;
}
.campo input:focus,.campo select:focus,.campo textarea:focus{
  outline:none;border-color:rgba(212,28,28,.55);box-shadow:0 0 0 2px rgba(212,28,28,.09);
}
.campo select option{background:var(--surface2)}
.campo textarea{min-height:90px;resize:vertical;line-height:1.6}
.campo-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.campo-row .campo{margin-bottom:0}

/* Ingredientes form */
.ing-headers{display:grid;grid-template-columns:1fr 66px 70px 82px 34px;gap:6px;margin-bottom:6px}
.ing-headers span{
  font-family:var(--font-m);font-size:8.5px;text-transform:uppercase;letter-spacing:.8px;
  color:var(--text-3);padding:0 10px;
}
.ing-form-lista{margin-bottom:12px}
.ing-form-item{
  display:grid;grid-template-columns:1fr 66px 70px 82px 34px;
  gap:6px;align-items:center;margin-bottom:7px;
}
.ing-form-item input,.ing-form-item select{
  background:var(--surface2);border:1px solid var(--border-mid);color:var(--text);
  padding:9px 10px;border-radius:3px;font-family:var(--font-b);font-size:13px;font-weight:600;
  width:100%;transition:border-color .2s;
}
.ing-form-item input:focus,.ing-form-item select:focus{outline:none;border-color:rgba(212,28,28,.5)}
.btn-rem{
  background:var(--surface2);border:1px solid var(--border);color:var(--text-3);
  width:34px;height:37px;border-radius:3px;cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;
}
.btn-rem:hover{background:rgba(212,28,28,.1);color:var(--red);border-color:rgba(212,28,28,.3)}
.btn-add-ing{
  width:100%;background:transparent;border:1px dashed var(--border-hi);color:var(--text-3);
  padding:10px;border-radius:3px;font-family:var(--font-d);font-size:13px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s;margin-bottom:16px;
}
.btn-add-ing:hover{border-color:var(--gold);color:var(--gold);background:rgba(200,144,42,.05)}

/* Buttons */
.btn-primary{
  width:100%;background:var(--red);color:#fff;border:none;padding:16px;border-radius:3px;
  font-family:var(--font-d);font-size:17px;font-weight:800;letter-spacing:3px;text-transform:uppercase;
  cursor:pointer;transition:box-shadow .2s,transform .1s;
  box-shadow:0 4px 22px rgba(212,28,28,.3);position:relative;overflow:hidden;
}
.btn-primary::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 0%,rgba(255,140,0,.22) 50%,transparent 100%);
  background-size:200% 100%;opacity:0;transition:opacity .3s;
}
.btn-primary:hover::after{opacity:1;animation:fire-shift 1.1s linear infinite}
.btn-primary:hover{box-shadow:0 4px 30px rgba(212,28,28,.6),0 0 60px rgba(255,80,0,.12)}
.btn-primary:active{transform:scale(.98)}
.btn-primary:disabled{background:var(--surface3);color:var(--text-3);cursor:not-allowed;box-shadow:none}
.btn-primary:disabled::after{display:none}
@keyframes fire-shift{0%{background-position:-200% 0}100%{background-position:200% 0}}

.btn-secondary{
  background:var(--surface2);border:1px solid var(--border-hi);color:var(--text-2);
  padding:13px;border-radius:3px;font-family:var(--font-d);font-size:14px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .15s;
}
.btn-secondary:hover{background:var(--surface3);color:var(--text)}

/* ── MODAL ── */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);
  z-index:500;align-items:flex-end;justify-content:center;
}
.modal-overlay.open{display:flex}
.modal{
  background:var(--surface);border:1px solid var(--border-hi);
  border-radius:3px 3px 0 0;padding:22px;width:100%;max-width:480px;
}
.modal-title{
  font-family:var(--font-d);font-weight:800;font-size:20px;
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:18px;color:var(--text);
}
.modal-title em{color:var(--gold);font-style:normal}
.modal-actions{display:flex;gap:8px;margin-top:18px}
.modal-actions button{flex:1}

/* ── BOTTOM NAV ── */
.bot-nav{
  position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);
  background:var(--surface);background-image:var(--metal);
  border-top:1px solid var(--border-mid);display:flex;z-index:200;
  padding-bottom:env(safe-area-inset-bottom);
}
.nav-btn{
  flex:1;background:none;border:none;border-top:2px solid transparent;
  color:var(--text-3);display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;cursor:pointer;transition:all .15s;
  padding:8px 4px;-webkit-tap-highlight-color:transparent;
}
.nav-btn.active{color:var(--red);border-top-color:var(--red)}
.nav-ico{font-size:17px;line-height:1;font-family:var(--font-d);font-weight:800}
.nav-lbl{font-family:var(--font-m);font-size:8px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:calc(var(--nav-h) + 12px);left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--surface);border:1px solid var(--border-hi);color:var(--text);
  font-family:var(--font-m);font-size:11px;font-weight:500;letter-spacing:.5px;
  padding:10px 22px;border-radius:3px;opacity:0;pointer-events:none;
  transition:all .25s;z-index:999;white-space:nowrap;box-shadow:0 4px 28px rgba(0,0,0,.55);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok {border-color:rgba(34,197,94,.5);color:var(--ember-ok)}
.toast.err{border-color:rgba(212,28,28,.5);color:var(--red)}
</style>
</head>
<body>

<!-- ══ LOCK SCREEN ══ -->
<div class="lock-screen" id="lockScreen">
  <div class="lock-icon">🔒</div>
  <div class="lock-title">Acesso Restrito</div>
  <div class="lock-sub">Fichas Técnicas · Digite o código</div>
  <input type="password" inputmode="numeric" pattern="[0-9]*" maxlength="4" class="lock-input" id="lockInput" placeholder="••••" autofocus>
  <div class="lock-err" id="lockErr"></div>
  <button class="btn-primary lock-btn" onclick="checkPin()">Entrar</button>
</div>

<!-- ══ HEADER ══ -->
<header class="hdr">
  <div class="hdr-logo">
    <svg width="40" height="45" viewBox="0 0 90 100" xmlns="http://www.w3.org/2000/svg" style="overflow:visible">
      <line x1="16" y1="88" x2="74" y2="12" stroke="white" stroke-width="9" stroke-linecap="round"/>

<div class="toast" id="toast"></div>

<script>
const URL_BASE = 'https://dujpusltkduhkgbbkzku.supabase.co';
const KEY = 'sb_publishable_cB0TPoQUWXmGB6t-hCsdiQ_Ir2U_GZA';

let cacheReceitas    = [];
let cacheIngredientes = [];
let modalReceitaId   = null;
let modalIngId       = null;
let filtroAtivo      = '';
let filtroCategoria  = '';
let ingCount         = 0;

const CAT_ORDEM = [
  'Hambúrguer','Burguer Especial','Smash','Frango','Suíno','Vegetariano','Kids',
  'Combo','Bebida','Cerveja','Batata Frita','Pizza','Kit','Outros'
];

const req = (path, opts = {}) => fetch(`${URL_BASE}/rest/v1/${path}`, {
  headers: {
    'apikey': KEY, 'Authorization': `Bearer ${KEY}`,
    'Content-Type': 'application/json',
    'Prefer': opts.prefer || 'return=representation',
    ...opts.headers
  }, ...opts
});

/* ── RELÓGIO ── */
function tick() {
  const t = new Date();
  document.getElementById('hdrTime').textContent =
    t.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
}
setInterval(tick, 1000); tick();

/* ── NAVEGAÇÃO ── */
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
}

/* ── FILTRO ── */
function setFiltro(f) {
  filtroAtivo = f;
  document.querySelectorAll('#filtroRow .f-pill').forEach((p,i) => {
    p.classList.toggle('active', (['', 'ativo', 'inativo'][i]) === f);
  });
  renderFichas();
}

function setFiltroCategoria(c) {
  filtroCategoria = c;
  document.querySelectorAll('#catFiltroRow .f-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.cat === c);
  });
  renderFichas();
}

function renderCategoriaPills() {
  const presentes = [...new Set(cacheReceitas.map(r => r.categoria || 'Outros'))];
  const ordenadas = CAT_ORDEM.filter(c => presentes.includes(c))
    .concat(presentes.filter(c => !CAT_ORDEM.includes(c)));
  const row = document.getElementById('catFiltroRow');
  row.innerHTML = `<button class="f-pill cat ${filtroCategoria==='' ? 'active':''}" data-cat="" onclick="setFiltroCategoria('')">Todas categorias</button>`
    + ordenadas.map(c => {
        const n = cacheReceitas.filter(r => (r.categoria||'Outros') === c).length;
        return `<button class="f-pill cat ${filtroCategoria===c ? 'active':''}" data-cat="${c}" onclick="setFiltroCategoria('${c.replace(/'/g,"\\'")}')">${c} (${n})</button>`;
      }).join('');
}

/* ── TOAST ── */
function toast(msg, tipo) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + (tipo||'ok') + ' show';
  setTimeout(() => el.classList.remove('show'), 2800);
}

/* ── CARREGAR ── */
async function load() {
  try {
    const [rR, rI] = await Promise.all([
      req('receitas?select=*&order=nome'),
      req('ingredientes?select=*')
    ]);
    if (!rR.ok || !rI.ok) throw 0;
    cacheReceitas     = await rR.json();
    cacheIngredientes = await rI.json();
    renderCategoriaPills();
    renderFichas();
    updateStats();
  } catch {
    document.getElementById('listaFichas').innerHTML =
      '<div class="vazio">Erro de conexão.<br>Verifique e tente novamente.</div>';
  }
}

/* ── STATS ── */
function updateStats() {
  const ativas = cacheReceitas.filter(r => r.ativo !== false);
  const margens = cacheReceitas.map(r => {
    const ings  = cacheIngredientes.filter(i => i.receita_id === r.id);
    const cmv   = ings.reduce((s, i) => s + (parseFloat(i.custo_total) || 0), 0);
    const preco = parseFloat(r.preco_venda) || 0;
    return preco > 0 ? ((preco - cmv) / preco * 100) : null;
  }).filter(m => m !== null);
  const avgMargem = margens.length
    ? Math.round(margens.reduce((a,b) => a+b, 0) / margens.length)
    : 0;

  document.getElementById('sTotal').textContent  = cacheReceitas.length;
  document.getElementById('sAtivas').textContent = ativas.length;
  document.getElementById('sMargem').textContent = avgMargem + '%';
}

/* ── RENDER FICHAS ── */
function renderFichas() {
  const q = (document.getElementById('busca').value || '').toLowerCase();
  let lista = cacheReceitas.filter(r => {
    if (q && !r.nome.toLowerCase().includes(q)) return false;
    if (filtroAtivo === 'ativo'   && r.ativo === false) return false;
    if (filtroAtivo === 'inativo' && r.ativo !== false) return false;
    if (filtroCategoria && (r.categoria || 'Outros') !== filtroCategoria) return false;
    return true;
  });

  if (!lista.length) {
    document.getElementById('listaFichas').innerHTML =
      '<div class="vazio">Nenhuma receita encontrada.<br>Cadastre uma nova.</div>';
    return;
  }

  document.getElementById('listaFichas').innerHTML = lista.map(r => {
    const ings     = cacheIngredientes.filter(i => i.receita_id === r.id);
    const cmv      = ings.reduce((s,i) => s + (parseFloat(i.custo_total)||0), 0);
    const preco    = parseFloat(r.preco_venda) || 0;
    const margem   = preco > 0 ? ((preco - cmv) / preco * 100) : 0;
    const cmvPct   = preco > 0 ? (cmv / preco * 100) : 0;
    const mClass   = margem >= 60 ? 'cmv-ok' : margem >= 40 ? 'cmv-warn' : 'cmv-bad';
    const barColor = margem >= 60 ? 'var(--ember-ok)' : margem >= 40 ? 'var(--ember-warn)' : 'var(--red)';
    const barW     = Math.max(0, Math.min(100, margem));

    const tabelaIng = ings.length ? `
      <table class="ing-table">
        <thead><tr>
          <th>Ingrediente</th>
          <th>Qtd</th>
          <th style="text-align:right">Custo</th>
          <th style="text-align:right;width:34px"></th>
        </tr></thead>
        <tbody>${ings.map(i => `
          <tr>
            <td>${i.item}</td>
            <td>${i.quantidade} ${i.unidade||''}</td>
            <td>R$ ${parseFloat(i.custo_total||0).toFixed(2)}</td>
            <td><button class="btn-edit-ing" onclick="abrirModal('${r.id}','${i.id}','${i.item.replace(/'/g,"\\'")}',${i.quantidade},'${i.unidade||''}',${i.custo_unitario||0})" title="Editar">✏</button></td>
          </tr>`).join('')}
        </tbody>
      </table>` : '<p style="font-size:13px;color:var(--text-3);margin-bottom:16px;font-style:italic">Nenhum ingrediente cadastrado.</p>';

    const preparoHtml = r.modo_preparo
      ? `<div class="preparo-box">${r.modo_preparo}</div>`
      : `<div class="preparo-box preparo-vazio">Modo de preparo não cadastrado.</div>`;

    return `
    <div class="rec-card" id="card-${r.id}">
      <div class="rec-header" onclick="toggleCard('${r.id}')">
        <div class="rec-left">
          <div class="rec-nome">${r.nome}</div>
          <div class="rec-badges">
            <span class="badge cat">${r.categoria || 'Outros'}</span>
            <span class="badge ${r.ativo !== false ? 'ativo':'inativo'}">${r.ativo !== false ? 'Ativo':'Inativo'}</span>
            ${r.tempo_preparo ? `<span class="badge">${r.tempo_preparo} min</span>` : ''}
            ${ings.length ? `<span class="badge">${ings.length} ing.</span>` : ''}
          </div>
        </div>
        <div class="rec-right">
          <div class="rec-preco">R$ ${preco.toFixed(2)}</div>
          <div class="rec-preco-lbl">Preço de venda</div>
          <span class="rec-chevron">▼</span>
        </div>
      </div>
      <div class="rec-body">

        <div class="cmv-panel">
          <div class="cmv-cell">
            <div class="cmv-val cmv-bad">R$ ${cmv.toFixed(2)}</div>
            <div class="cmv-lbl">Custo CMV</div>
          </div>
          <div class="cmv-cell">
            <div class="cmv-val ${mClass}">${margem.toFixed(0)}%</div>
            <div class="cmv-lbl">Margem</div>
          </div>
          <div class="cmv-cell">
            <div class="cmv-val cmv-neu">${cmvPct.toFixed(0)}%</div>
            <div class="cmv-lbl">CMV %</div>
          </div>
        </div>

        <div class="margem-bar-wrap">
          <div class="margem-bar-lbl">
            <span style="font-size:8.5px;font-family:var(--font-m);text-transform:uppercase;letter-spacing:1px;color:var(--text-3)">Margem de lucro</span>
            <span style="font-size:8.5px;font-family:var(--font-m);color:${barColor}">${margem.toFixed(1)}%</span>
          </div>
          <div class="margem-bar-track">
            <div class="margem-bar-fill" style="width:${barW}%;background:${barColor}"></div>
          </div>
        </div>

        <div class="sub-lbl">Ingredientes</div>
        ${tabelaIng}

        <div class="sub-lbl">Modo de preparo</div>
        ${preparoHtml}

        <div class="rec-actions">
          <button class="btn-action" onclick="editarReceita('${r.id}')">✏ Editar</button>
          <button class="btn-action" onclick="toggleAtivo('${r.id}',${r.ativo !== false})">${r.ativo !== false ? '⏸ Desativar':'▶ Ativar'}</button>
          <button class="btn-action danger" onclick="deletarReceita('${r.id}')">✕ Excluir</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleCard(id) {
  document.getElementById('card-' + id).classList.toggle('open');
}

/* ── MODAL ── */
function abrirModal(rId, ingId, nome, qtd, un, custo) {
  modalReceitaId = rId; modalIngId = ingId;
  document.getElementById('mIngNome').value  = nome;
  document.getElementById('mIngQtd').value   = qtd;
  document.getElementById('mIngCusto').value = custo || '';
  document.getElementById('modalOverlay').classList.add('open');
}
function fecharModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  modalIngId = null; modalReceitaId = null;
}
async function salvarIngModal() {
  const qtd   = parseFloat(document.getElementById('mIngQtd').value) || 0;
  const custo = parseFloat(document.getElementById('mIngCusto').value) || 0;
  try {
    const r = await req(`ingredientes?id=eq.${modalIngId}`, {
      method:'PATCH',
      body: JSON.stringify({quantidade:qtd, custo_unitario:custo})
    });
    if (!r.ok) throw 0;
    toast('✓ Custo atualizado!');
    fecharModal(); await load();
  } catch { toast('Erro ao salvar.','err'); }
}
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) fecharModal();
});

/* ── FORM NOVA RECEITA ── */
function resetFormReceita() {
  document.getElementById('rNome').value    = '';
  document.getElementById('rCategoria').value = 'Hambúrguer';
  document.getElementById('rPreco').value   = '0';
  document.getElementById('rTempo').value   = '10';
  document.getElementById('rPreparo').value = '';
  document.getElementById('formTitulo').innerHTML = 'Nova <em>receita</em>';
  const btn = document.getElementById('btnSalvar');
  btn.textContent = 'Salvar receita';
  btn.onclick = salvarReceita;
  document.getElementById('ingLista').innerHTML = '';
  ingCount = 0;
  addIngLinha();
}

function addIngLinha() {
  ingCount++;
  const id  = 'ing-' + ingCount;
  const div = document.createElement('div');
  div.className = 'ing-form-item'; div.id = id;
  div.innerHTML = `
    <input type="text" placeholder="Ingrediente" class="ing-nome">
    <input type="number" placeholder="Qtd" class="ing-qtd" min="0" step="0.01" value="1">
    <select class="ing-un">
      <option>un</option><option>g</option><option>kg</option>
      <option>ml</option><option>L</option><option>pct</option><option>cx</option>
    </select>
    <input type="number" placeholder="R$ 0,00" class="ing-custo" min="0" step="0.01">
    <button class="btn-rem" onclick="remIng('${id}')">×</button>`;
  document.getElementById('ingLista').appendChild(div);
}
function remIng(id) { const el = document.getElementById(id); if(el) el.remove(); }

async function salvarReceita() {
  const nome = document.getElementById('rNome').value.trim();
  if (!nome) return toast('Informe o nome!','err');
  const btn = document.getElementById('btnSalvar');
  btn.disabled = true; btn.textContent = 'Salvando…';
  try {
    const rR = await req('receitas', {
      method:'POST',
      body: JSON.stringify({
        nome,
        categoria: document.getElementById('rCategoria').value,
        preco_venda:   parseFloat(document.getElementById('rPreco').value) || 0,
        tempo_preparo: parseInt(document.getElementById('rTempo').value) || 0,
        modo_preparo:  document.getElementById('rPreparo').value.trim() || null,
        ativo: true
      })
    });
    if (!rR.ok) throw 0;
    const [receita] = await rR.json();
    await salvarIngs(receita.id);
    toast('✓ Receita salva!');
    await load(); showScreen('fichas');
  } catch { toast('Erro ao salvar.','err'); }
  finally { btn.disabled = false; btn.textContent = 'Salvar receita'; }
}

async function salvarIngs(receitaId) {
  const linhas = document.getElementById('ingLista').querySelectorAll('.ing-form-item');
  const lista  = [];
  linhas.forEach(l => {
    const n = l.querySelector('.ing-nome').value.trim();
    const q = parseFloat(l.querySelector('.ing-qtd').value) || 0;
    const u = l.querySelector('.ing-un').value;
    const c = parseFloat(l.querySelector('.ing-custo').value) || 0;
    if (n) lista.push({receita_id:receitaId, item:n, quantidade:q, unidade:u, custo_unitario:c});
  });
  if (lista.length) await req('ingredientes', {method:'POST', body:JSON.stringify(lista)});
}

/* ── EDITAR ── */
function editarReceita(id) {
  const r    = cacheReceitas.find(x => x.id === id);
  if (!r) return;
  document.getElementById('rNome').value    = r.nome;
  document.getElementById('rCategoria').value = r.categoria || 'Hambúrguer';
  document.getElementById('rPreco').value   = r.preco_venda || 0;
  document.getElementById('rTempo').value   = r.tempo_preparo || 10;
  document.getElementById('rPreparo').value = r.modo_preparo || '';
  document.getElementById('formTitulo').innerHTML = 'Editar <em>receita</em>';

  const ings = cacheIngredientes.filter(i => i.receita_id === id);
  document.getElementById('ingLista').innerHTML = ''; ingCount = 0;
  if (ings.length) {
    ings.forEach(ing => {
      ingCount++;
      const divId = 'ing-' + ingCount;
      const div = document.createElement('div');
      div.className = 'ing-form-item'; div.id = divId;
      div.innerHTML = `
        <input type="text" class="ing-nome" value="${ing.item}">
        <input type="number" class="ing-qtd" value="${ing.quantidade}" min="0" step="0.01">
        <select class="ing-un">
          ${['un','g','kg','ml','L','pct','cx'].map(u => `<option ${u===ing.unidade?'selected':''}>${u}</option>`).join('')}
        </select>
        <input type="number" class="ing-custo" value="${ing.custo_unitario||''}" min="0" step="0.01" placeholder="R$ 0,00">
        <button class="btn-rem" onclick="remIng('${divId}')">×</button>`;
      document.getElementById('ingLista').appendChild(div);
    });
  } else { addIngLinha(); }

  const btn = document.getElementById('btnSalvar');
  btn.textContent = 'Atualizar receita';
  btn.onclick = () => atualizarReceita(id);
  showScreen('nova');
}

async function atualizarReceita(id) {
  const nome = document.getElementById('rNome').value.trim();
  if (!nome) return toast('Informe o nome!','err');
  const btn = document.getElementById('btnSalvar');
  btn.disabled = true; btn.textContent = 'Salvando…';
  try {
    const rP = await req(`receitas?id=eq.${id}`, {
      method:'PATCH',
      body: JSON.stringify({
        nome, categoria: document.getElementById('rCategoria').value,
        preco_venda: parseFloat(document.getElementById('rPreco').value)||0,
        tempo_preparo: parseInt(document.getElementById('rTempo').value)||0,
        modo_preparo: document.getElementById('rPreparo').value.trim()||null,
      })
    });
    if (!rP.ok) throw new Error('Falha ao atualizar receita (status '+rP.status+')');

    const rD = await req(`ingredientes?receita_id=eq.${id}`, {method:'DELETE', headers:{}});
    if (!rD.ok) throw new Error('Falha ao remover ingredientes antigos (status '+rD.status+')');

    await salvarIngs(id);
    toast('✓ Receita atualizada!');
    await load(); showScreen('fichas');
  } catch (e) { toast('Erro: ' + e.message,'err'); }
  finally {
    btn.disabled = false; btn.textContent = 'Salvar receita';
    btn.onclick = salvarReceita;
  }
}

async function toggleAtivo(id, ativo) {
  try {
    await req(`receitas?id=eq.${id}`, {method:'PATCH', body:JSON.stringify({ativo:!ativo})});
    toast(ativo ? '⏸ Receita desativada' : '▶ Receita ativada');
    await load();
  } catch { toast('Erro.','err'); }
}

async function deletarReceita(id) {
  if (!confirm('Excluir esta receita e seus ingredientes?')) return;
  try {
    const rD1 = await req(`ingredientes?receita_id=eq.${id}`, {method:'DELETE', headers:{}});
    if (!rD1.ok) throw new Error('Falha ao excluir ingredientes (status '+rD1.status+')');
    const rD2 = await req(`receitas?id=eq.${id}`, {method:'DELETE', headers:{}});
    if (!rD2.ok) throw new Error('Falha ao excluir receita (status '+rD2.status+')');
    toast('Receita excluída');
    await load();
  } catch (e) { toast('Erro: ' + e.message,'err'); }
}

resetFormReceita();

/* ── BLOQUEIO ── */
const FICHAS_PIN = '1632';

function checkPin() {
  const val = document.getElementById('lockInput').value.trim();
  if (val === FICHAS_PIN) {
    sessionStorage.setItem('fichas_unlocked', '1');
    document.getElementById('lockScreen').style.display = 'none';
    load();
  } else {
    document.getElementById('lockErr').textContent = 'Código incorreto';
    document.getElementById('lockInput').value = '';
    document.getElementById('lockInput').focus();
  }
}

function bloquear() {
  sessionStorage.removeItem('fichas_unlocked');
  location.reload();
}

document.getElementById('lockInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPin();
});

if (sessionStorage.getItem('fichas_unlocked') === '1') {
  document.getElementById('lockScreen').style.display = 'none';
  load();
}
</script>
